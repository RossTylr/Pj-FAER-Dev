version: "1.0.0"
last_updated: "2026-02-20"
source: "BATLS 2024 / DSTL operational analysis / NB24 calibration"
notes: "Initial reference file from Phase 2 hardcoded values + NB24 calibration"

# === MECHANISMS ===
mechanisms:
  BLAST:
    description: "Explosive device -- IED, mortar, artillery, drone munition"
    context_prevalence:
      LSCO: 0.50
      COIN: 0.35
      HADR: 0.05
      SPECOPS: 0.30
    region_probabilities:
      HEAD: 0.08
      FACE: 0.04
      NECK: 0.03
      THORAX: 0.18
      ABDOMEN: 0.15
      PELVIS: 0.06
      UPPER_EXTREMITY: 0.18
      LOWER_EXTREMITY: 0.22
      SPINE: 0.04
      EXTERNAL: 0.02
    severity_modifier: 1.2
    polytrauma_probability: 0.35
    treatment_time_modifier: 1.3
    deterioration_modifier: 1.2

  GSW:
    description: "Gunshot wound -- small arms, sniper, heavy weapons"
    context_prevalence:
      LSCO: 0.25
      COIN: 0.40
      HADR: 0.05
      SPECOPS: 0.50
    region_probabilities:
      HEAD: 0.12
      FACE: 0.03
      NECK: 0.04
      THORAX: 0.14
      ABDOMEN: 0.12
      PELVIS: 0.04
      UPPER_EXTREMITY: 0.22
      LOWER_EXTREMITY: 0.24
      SPINE: 0.03
      EXTERNAL: 0.02
    severity_modifier: 1.1
    polytrauma_probability: 0.15
    treatment_time_modifier: 1.1
    deterioration_modifier: 1.0

  BLUNT:
    description: "Blunt force trauma -- vehicle accident, fall, collapse"
    context_prevalence:
      LSCO: 0.10
      COIN: 0.10
      HADR: 0.50
      SPECOPS: 0.05
    region_probabilities:
      HEAD: 0.15
      FACE: 0.08
      NECK: 0.02
      THORAX: 0.12
      ABDOMEN: 0.08
      PELVIS: 0.06
      UPPER_EXTREMITY: 0.18
      LOWER_EXTREMITY: 0.25
      SPINE: 0.04
      EXTERNAL: 0.02
    severity_modifier: 0.9
    polytrauma_probability: 0.20
    treatment_time_modifier: 1.0
    deterioration_modifier: 0.8

  PENETRATING:
    description: "Penetrating trauma -- shrapnel, knife, debris"
    context_prevalence:
      LSCO: 0.10
      COIN: 0.10
      HADR: 0.10
      SPECOPS: 0.10
    region_probabilities:
      HEAD: 0.06
      FACE: 0.05
      NECK: 0.04
      THORAX: 0.16
      ABDOMEN: 0.14
      PELVIS: 0.05
      UPPER_EXTREMITY: 0.20
      LOWER_EXTREMITY: 0.24
      SPINE: 0.03
      EXTERNAL: 0.03
    severity_modifier: 1.0
    polytrauma_probability: 0.10
    treatment_time_modifier: 1.2
    deterioration_modifier: 1.0

  BURN:
    description: "Thermal or chemical burn"
    context_prevalence:
      LSCO: 0.03
      COIN: 0.03
      HADR: 0.15
      SPECOPS: 0.03
    region_probabilities:
      HEAD: 0.10
      FACE: 0.12
      NECK: 0.05
      THORAX: 0.15
      ABDOMEN: 0.08
      PELVIS: 0.03
      UPPER_EXTREMITY: 0.22
      LOWER_EXTREMITY: 0.15
      SPINE: 0.02
      EXTERNAL: 0.08
    severity_modifier: 1.3
    polytrauma_probability: 0.05
    treatment_time_modifier: 1.5
    deterioration_modifier: 1.5

  ENVIRONMENTAL:
    description: "Environmental -- heat, cold, altitude, drowning"
    context_prevalence:
      LSCO: 0.02
      COIN: 0.02
      HADR: 0.15
      SPECOPS: 0.02
    region_probabilities:
      HEAD: 0.05
      FACE: 0.03
      NECK: 0.02
      THORAX: 0.10
      ABDOMEN: 0.05
      PELVIS: 0.02
      UPPER_EXTREMITY: 0.15
      LOWER_EXTREMITY: 0.15
      SPINE: 0.02
      EXTERNAL: 0.41
    severity_modifier: 0.7
    polytrauma_probability: 0.02
    treatment_time_modifier: 0.8
    deterioration_modifier: 0.6

# === REGIONS ===
regions:
  HEAD:
    surgical: false
    treatment_time_modifier: 1.4
    gcs_modifier: -3
  FACE:
    surgical: false
    treatment_time_modifier: 1.1
    gcs_modifier: 0
  NECK:
    surgical: true
    treatment_time_modifier: 1.2
    gcs_modifier: -1
  THORAX:
    surgical: true
    treatment_time_modifier: 1.3
    gcs_modifier: -1
  ABDOMEN:
    surgical: true
    treatment_time_modifier: 1.2
    gcs_modifier: 0
  PELVIS:
    surgical: true
    treatment_time_modifier: 1.3
    gcs_modifier: 0
  UPPER_EXTREMITY:
    surgical: false
    treatment_time_modifier: 0.9
    gcs_modifier: 0
  LOWER_EXTREMITY:
    surgical: false
    treatment_time_modifier: 1.0
    gcs_modifier: 0
  SPINE:
    surgical: true
    treatment_time_modifier: 1.5
    gcs_modifier: -2
  EXTERNAL:
    surgical: false
    treatment_time_modifier: 0.7
    gcs_modifier: 0

# === SEVERITY: Context-specific Beta(alpha, beta) ===
severity:
  LSCO:
    alpha: 3.0
    beta: 3.0
  COIN:
    alpha: 2.0
    beta: 4.0
  HADR:
    alpha: 1.5
    beta: 5.0
  SPECOPS:
    alpha: 3.5
    beta: 2.5

# === TREATMENT TIMES: Hierarchical (dept, mechanism, region) ===
treatment_times:
  DCR:
    default: {mean: 15, std: 5}
    BLAST: {mean: 20, std: 8}
    BURN: {mean: 25, std: 10}
  FST:
    default: {mean: 90, std: 30}
    BLAST.THORAX: {mean: 120, std: 40}
    BLAST.ABDOMEN: {mean: 110, std: 35}
    GSW.THORAX: {mean: 100, std: 30}
    GSW.UPPER_EXTREMITY: {mean: 45, std: 15}
    GSW.LOWER_EXTREMITY: {mean: 60, std: 20}
    BURN: {mean: 130, std: 45}
  ITU:
    default: {mean: 240, std: 60}
    BLAST: {mean: 300, std: 80}
    BURN: {mean: 360, std: 90}
  HDU:
    default: {mean: 180, std: 45}
  WARD:
    default: {mean: 120, std: 30}
  ED:
    default: {mean: 20, std: 10}

# === DETERIORATION ===
deterioration:
  base_rates_per_5min:
    T1_SURGICAL:
      without_pfc: 0.020
      with_pfc: 0.006
      max_pfc_hours: 5
    T1_MEDICAL:
      without_pfc: 0.015
      with_pfc: 0.0045
      max_pfc_hours: 7
    T2:
      without_pfc: 0.005
      with_pfc: 0.0015
      max_pfc_hours: 15
    T3:
      without_pfc: 0.001
      with_pfc: 0.0003
      max_pfc_hours: 24
    T4:
      without_pfc: 0.030
      with_pfc: 0.009
      max_pfc_hours: 0
  mechanism_modifiers:
    BLAST: 1.2
    GSW: 1.0
    BLUNT: 0.8
    PENETRATING: 1.0
    BURN: 1.5
    ENVIRONMENTAL: 0.6

# === VITALS BASELINES (triage-dependent) ===
vitals_baselines:
  T1_SURGICAL:
    gcs: {mean: 12, std: 2, min: 3, max: 15}
    heart_rate: {mean: 120, std: 15, min: 40, max: 180}
    systolic_bp: {mean: 85, std: 15, min: 40, max: 200}
    respiratory_rate: {mean: 24, std: 6, min: 8, max: 40}
    spo2: {mean: 92, std: 4, min: 70, max: 100}
  T1_MEDICAL:
    gcs: {mean: 13, std: 2, min: 3, max: 15}
    heart_rate: {mean: 110, std: 12, min: 40, max: 180}
    systolic_bp: {mean: 90, std: 15, min: 40, max: 200}
    respiratory_rate: {mean: 22, std: 5, min: 8, max: 40}
    spo2: {mean: 94, std: 3, min: 70, max: 100}
  T2:
    gcs: {mean: 14, std: 1, min: 3, max: 15}
    heart_rate: {mean: 95, std: 10, min: 40, max: 180}
    systolic_bp: {mean: 110, std: 12, min: 40, max: 200}
    respiratory_rate: {mean: 18, std: 4, min: 8, max: 40}
    spo2: {mean: 96, std: 2, min: 70, max: 100}
  T3:
    gcs: {mean: 15, std: 0.5, min: 3, max: 15}
    heart_rate: {mean: 80, std: 8, min: 40, max: 180}
    systolic_bp: {mean: 125, std: 10, min: 40, max: 200}
    respiratory_rate: {mean: 16, std: 3, min: 8, max: 40}
    spo2: {mean: 98, std: 1, min: 70, max: 100}
  T4:
    gcs: {mean: 6, std: 3, min: 3, max: 15}
    heart_rate: {mean: 140, std: 20, min: 40, max: 180}
    systolic_bp: {mean: 60, std: 20, min: 30, max: 200}
    respiratory_rate: {mean: 30, std: 8, min: 4, max: 45}
    spo2: {mean: 85, std: 8, min: 50, max: 100}

# === TRIAGE THRESHOLDS (for BT decision trees) ===
triage_thresholds:
  t1_surgical:
    severity_min: 0.70
    requires_surgical_region: true
  t1_medical:
    severity_min: 0.70
    requires_surgical_region: false
  t2:
    severity_min: 0.35
  t3:
    severity_max: 0.35
  t4:
    severity_min: 0.90
    paths:
      path_a: {severity_min: 0.90, requires_head: true}
      path_b: {severity_min: 0.96, requires_mascal: true}
      path_c: {severity_min: 0.86, requires_head: true, requires_mascal: true}

# === PFC (Prolonged Field Care) — PRD v7.0 §7.4 ===
pfc:
  retriage_interval_min: 30
  max_pfc_hours:
    T1_SURGICAL: 5.0
    T1_MEDICAL: 7.0
    T2: 15.0
    T3: 24.0
    T4: 48.0
  pfc_deterioration_reduction:
    with_cmt: 0.3
    without_cmt: 0.6
  interventions:
    tourniquet:
      time_min: 2.0
      resource_required: true
      deterioration_reduction: 0.15
    iv_access:
      time_min: 5.0
      resource_required: true
      deterioration_reduction: 0.10
    hemostatic_dressing:
      time_min: 3.0
      resource_required: true
      deterioration_reduction: 0.05
  retriage_thresholds:
    gcs_below: 8
    heart_rate_above: 130
    systolic_bp_below: 80
    spo2_below: 88

# ── Reserved for Visual Operational Planner (not consumed by Phase 3) ──
transport_platforms: {}
# Future: platform catalogue with litter_capacity, speed, clinical_capability
# See: FAER-M_Visual_Operational_Planner_Ideation.docx §4.2
